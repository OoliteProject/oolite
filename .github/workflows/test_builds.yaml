name: Test Oolite package on various platforms
on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04
    steps:
      - name: Update Ubuntu
        run: |
          apt-get update
          apt-get install -y git
      - name: Pre-setup ownership
        run: |
          # This must run before the checkout action if the action tries to do git commands
          mkdir -p "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install packages
        run: |
          ShellScripts/Linux/install_packages_root.sh
      - name: Build GNUstep
        run: |
          ShellScripts/Linux/build_gnustep.sh system
      - name: Install Mozilla static library
        run: |
          ShellScripts/Linux/install_mozilla_js.sh system
      - name: Build and test Oolite
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        run: |
          ShellScripts/common/build_oolite.sh test
      - name: Build Oolite (no test)
        if: github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
        run: |
          ShellScripts/common/build_oolite.sh
      - name: Build AppImage
        run: |
          ShellScripts/common/build_oolite.sh pkg-appimage-snapshot

  fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Update Fedora
        run: |
          dnf -y update
          dnf -y install git
      - name: Pre-setup ownership
        run: |
          # This must run before the checkout action if the action tries to do git commands
          mkdir -p "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install packages
        run: |
          ShellScripts/Linux/install_packages_root.sh
      - name: Build GNUstep
        run: |
          ShellScripts/Linux/build_gnustep.sh system
      - name: Install Mozilla static library
        run: |
          ShellScripts/Linux/install_mozilla_js.sh system
      - name: Build and test Oolite
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        run: |
          ShellScripts/common/build_oolite.sh test
      - name: Build Oolite (no test)
        if: github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
        run: |
          ShellScripts/common/build_oolite.sh
      - name: Build AppImage
        run: |
          ShellScripts/common/build_oolite.sh pkg-appimage-snapshot

  arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Update Arch
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed git
      - name: Pre-setup ownership
        run: |
          # This must run before the checkout action if the action tries to do git commands
          mkdir -p "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install packages
        run: |
          ShellScripts/Linux/install_packages_root.sh
      - name: Build GNUstep
        run: |
          ShellScripts/Linux/build_gnustep.sh system
      - name: Install Mozilla static library
        run: |
          ShellScripts/Linux/install_mozilla_js.sh system
      - name: Build and test Oolite
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        run: |
          ShellScripts/common/build_oolite.sh test
      - name: Build Oolite (no test)
        if: github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
        run: |
          ShellScripts/common/build_oolite.sh
      - name: Build AppImage
        run: |
          ShellScripts/common/build_oolite.sh pkg-appimage-snapshot

  windows:
    runs-on: windows-latest
    steps:
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download latest release assets
        uses: robinraju/release-downloader@v1
        with:
          repository: OoliteProject/oolite_windeps_build
          latest: true
          fileName: "*"
          out-file-path: build/packages

      - name: Install packages
        shell: msys2 {0}
        env:
          msystem: UCRT64
        run: |
          ShellScripts/Windows/install_deps.sh clang

      - name: Build and test Oolite
        if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
        shell: msys2 {0}
        env:
          msystem: UCRT64
        run: |
          ShellScripts/common/build_oolite.sh test

      - name: Build Oolite (no test)
        if: github.event.pull_request.head.repo.full_name != github.event.pull_request.base.repo.full_name
        shell: msys2 {0}
        env:
          msystem: UCRT64
        run: |
          ShellScripts/common/build_oolite.sh
