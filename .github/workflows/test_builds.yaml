name: Build Oolite package on various platforms
on:
  push:
  pull_request:

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Update Ubuntu
        run: |
          sudo apt-get update
          sudo apt-get install -y git
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - name: Checkout dependencies
        run: |
          ShellScripts/Linux/checkout_deps.sh
      - name: Install packages
        run: |
          sudo ShellScripts/Linux/install_deps_root.sh
      - name: Build Oolite
        run: |
          ShellScripts/common/build_oolite.sh test

  fedora:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
      options: >-
        --cap-add SYS_ADMIN
        --device /dev/fuse
        --security-opt apparmor:unconfined
    steps:
      - name: Update Fedora
        run: |
          dnf -y update
          dnf -y install git
      - name: Pre-setup ownership
        run: |
          # This must run before the checkout action if the action tries to do git commands
          mkdir -p "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - name: Checkout dependencies
        run: |
          ShellScripts/Linux/checkout_deps.sh
      - name: Install packages
        run: |
          ShellScripts/Linux/install_deps_root.sh
      - name: Build Oolite
        run: |
          ShellScripts/common/build_oolite.sh test

  arch:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: >-
        --cap-add SYS_ADMIN
        --device /dev/fuse
        --security-opt apparmor:unconfined
    steps:
      - name: Update Arch
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed git
      - name: Pre-setup ownership
        run: |
          # This must run before the checkout action if the action tries to do git commands
          mkdir -p "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true
      - name: Checkout dependencies
        run: |
          ShellScripts/Linux/checkout_deps.sh
      - name: Install packages
        run: |
          ShellScripts/Linux/install_deps_root.sh
      - name: Build Oolite
        run: |
          ShellScripts/common/build_oolite.sh test

  windows:
    runs-on: windows-latest
    steps:
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Download latest release assets
        uses: robinraju/release-downloader@v1
        with:
          repository: OoliteProject/oolite_windeps_build
          latest: true
          fileName: "*"
          out-file-path: build/packages

      - name: Install packages
        shell: msys2 {0}
        env:
          msystem: UCRT64
        run: |
          ShellScripts/Windows/install_deps.sh clang
          pacboy -S mesa --noconfirm

      - name: Enable interactive desktop for SDL
        shell: powershell
        run: |
          # Allow the runner service account to access the interactive window station
          $code = @"
          using System;
          using System.Runtime.InteropServices;
          public class Desktop {
            [DllImport("user32.dll")] public static extern IntPtr OpenWindowStation(string name, bool inherit, uint access);
            [DllImport("user32.dll")] public static extern bool SetProcessWindowStation(IntPtr hWinSta);
            [DllImport("user32.dll")] public static extern IntPtr OpenDesktop(string name, uint flags, bool inherit, uint access);
            [DllImport("user32.dll")] public static extern bool SetThreadDesktop(IntPtr hDesktop);
          }
          "@
            Add-Type -TypeDefinition $code
            $winsta = [Desktop]::OpenWindowStation("WinSta0", $false, 0x37F)
          [Desktop]::SetProcessWindowStation($winsta)
          $desktop = [Desktop]::OpenDesktop("Default", 0, $false, 0x1FF)
          [Desktop]::SetThreadDesktop($desktop)

      - name: Build Oolite
        shell: msys2 {0}
        env:
          msystem: UCRT64
        run: |
          ShellScripts/common/build_oolite.sh test
