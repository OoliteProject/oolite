name: Build Oolite package for various platforms
on:
  workflow_dispatch:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: >-
        --cap-add SYS_ADMIN
        --device /dev/fuse
        --security-opt apparmor:unconfined
    strategy:
      matrix:
        flavour: [pkg-appimage-deployment, pkg-appimage-test, pkg-appimage-dev]
    steps:
      ## This is for debugging only and helps developing the workflow.
      # - name: Environment Variables
      #  run: |
      #    printenv | sort

      - name: Update Arch
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed git
      - name: Pre-setup ownership
        run: |
          # This must run before the checkout action if the action tries to do git commands
          mkdir -p "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Checkout Oolite
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install packages
        run: |
          ShellScripts/Linux/install_packages_root.sh
      - name: Build GNUstep
        run: |
          ShellScripts/Linux/build_gnustep.sh system
      - name: Install Mozilla static library
        run: |
          ShellScripts/Linux/install_mozilla_js.sh system
          echo "/usr/local/lib" | tee -a /etc/ld.so.conf
          ldconfig
      - name: Build Oolite
        run: |
          ./mk.sh ${{matrix.flavour}} --github-repository="$GITHUB_REPOSITORY"
      - name: Archive installer
        uses: actions/upload-artifact@v6
        with:
          name: oolite-linux-${{matrix.flavour}}
          path: |
            build/oolite*.AppImage
          retention-days: 5

  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged
    steps:
      - name: Pre-setup ownership
        run: |
          # This must run before the checkout action if the action tries to do git commands
          mkdir -p "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Checkout Oolite
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Build flatpak
        run: |
          echo "Installing gitversion..."
          source ShellScripts/common/download_github_fn.sh
          OUTPUTDIR="."
          download_latest_release gitversion_tgz "GitTools" "GitVersion" "linux-x64" "$OUTPUTDIR"
          tar xfz ${gitversion_tgz} --directory "$OUTPUTDIR"
          chmod +x "$OUTPUTDIR/gitversion"
          mkdir -p /usr/local/bin
          mv "$OUTPUTDIR/gitversion" /usr/local/bin/gitversion
          rm -f ${gitversion_tgz}
          ./mk.sh pkg-flatpak --github-repository="$GITHUB_REPOSITORY"
      - name: Archive installer
        uses: actions/upload-artifact@v6
        with:
          name: oolite-flatpak
          path: |
            build/space.oolite.Oolite*.flatpak
          retention-days: 5

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        flavour: [pkg-win-deployment, pkg-win-test, pkg-win-dev]
    steps:
      ## This is for debugging only and helps developing the workflow.
      # - name: Environment Variables
      #  run: |
      #    Get-ChildItem Env: | Sort Name

      - name: Configure Git Line Endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          update: true
          cache: false
      - name: Checkout Oolite
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install packages
        shell: msys2 {0}
        env:
          msystem: UCRT64
        run: |
          ShellScripts/Windows/install_deps.sh clang
      - name: Build Oolite
        shell: msys2 {0}
        env:
          msystem: UCRT64
        run: |
          ./mk.sh ${{matrix.flavour}} --github-repository="$GITHUB_REPOSITORY"
      - name: Archive installer
        uses: actions/upload-artifact@v6
        with:
          name: oolite-windows-${{matrix.flavour}}
          path: |
            build/OoliteInstall*.exe
          retention-days: 5

  release:
    needs: [build-linux, build-flatpak, build-windows]
    runs-on: ubuntu-22.04
    # Only run for internal requests (so not for PRs from forks)
    if: github.event.pull_request.head.repo.full_name == github.event.pull_request.base.repo.full_name
    steps:
      ## This is for debugging only and helps developing the workflow.
      # - name: Environment Variables
      #  run: |
      #    printenv | sort

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts
      - name: Calculate version number and set VER_FULL
        id: version
        run: |
          set -x          
          # 1. Check that there are exactly 8 files recursively in the artifacts directory
          FILE_COUNT=$(find artifacts -type f | wc -l)
          echo "Total files found: $FILE_COUNT"          
          if [[ "$FILE_COUNT" -ne 8 ]]; then
            echo "❌ Expected exactly 8 files, but found $FILE_COUNT." >&2
            exit 1
          fi                    
          # 2. Get the path of the first available AppImage
          APPIMAGE_PATH=$(find artifacts -type f -name "*.AppImage" | head -n 1)          
          if [[ -z "$APPIMAGE_PATH" ]]; then
            echo "❌ No AppImages found in the downloaded artifacts!" >&2
            exit 1
          fi          
          echo "Found AppImage: $APPIMAGE_PATH"                    
          # 3. Run with packageinfo and extract the string inside quotes
          chmod +x "$APPIMAGE_PATH"
          VER_FULL=$("$APPIMAGE_PATH" packageinfo | awk -F'"' '/^[[:space:]]*version =/ {print $2; exit}')           
          if [[ -z "$VER_FULL" ]]; then
            echo "❌ Failed to extract version string from packageinfo output!" >&2
            exit 1
          fi                     
          echo "Extracted Version: $VER_FULL"          
          # 4. Output the extracted version for subsequent steps
          echo "VER_FULL=$VER_FULL" >> "$GITHUB_OUTPUT"
      - name: Remove old prereleases
        if: github.ref == 'refs/heads/master' || endsWith(github.ref, 'maintenance')
        uses: s00d/delete-older-releases@0.2.1
        with:
          keep_latest: 7
          delete_type: 'prerelease'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # For changes on master branch, create a new release.
      # It should move the 'latest' tag automatically.
      - name: Create Release
        id: create_release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          # automatic_release_tag: "latest"
          automatic_release_tag: "${{ steps.version.outputs.VER_FULL }}"
          prerelease: true
          title: "Oolite ${{ steps.version.outputs.VER_FULL }}"
          files: |
            artifacts/oolite-windows-pkg-win-deployment/OoliteInstall-*.exe
            artifacts/oolite-windows-pkg-win-test/OoliteInstall-*.exe
            artifacts/oolite-windows-pkg-win-dev/OoliteInstall-*-dev.exe
            artifacts/oolite-linux-pkg-appimage-deployment/*.AppImage
            artifacts/oolite-linux-pkg-appimage-test/*.AppImage
            artifacts/oolite-linux-pkg-appimage-dev/*.AppImage
            artifacts/oolite-flatpak/*.flatpak
      - name: Remove old workflow runs
        if: github.ref == 'refs/heads/master' || endsWith(github.ref, 'maintenance')
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30
          keep_minimum_runs: 8
