app-id: space.oolite.Oolite
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm21
build-options:
  append-path: /usr/lib/sdk/llvm21/bin
  prepend-ld-library-path: /usr/lib/sdk/llvm21/lib
command: run_oolite.sh
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  - --device=dri
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - "*.a"
  - "*.la"
modules:
  - shared-modules/SDL/sdl12-compat.json
  - name: pcaudiolib
    sources:
      - type: archive
        url: "https://github.com/espeak-ng/pcaudiolib/archive/refs/tags/1.3.tar.gz"
        sha256: "86edb75048eec7fcd8d74f9568f051d50b4781982215095b96ba9c2c9c7c159b"
  - name: espeak-ng
    sources:
      - type: archive
        url: "https://github.com/espeak-ng/espeak-ng/archive/refs/tags/1.52.0.tar.gz"
        sha256: "bb4338102ff3b49a81423da8a1a158b420124b055b60fa76cfb4b18677130a23"
  - name: robin-map
    buildsystem: cmake-ninja
    build-options:
      env:
        CC: clang
        CXX: clang++
        ASM: clang
    sources:
      - type: archive
        url: "https://github.com/Tessil/robin-map/archive/refs/tags/v1.4.1.tar.gz"
        sha256: "0e3f53a377fdcdc5f9fed7a4c0d4f99e82bbb64175233bd13427fef9a771f4a1"
  - name: libobjc2
    buildsystem: cmake-ninja
    build-options:
      env:
        CC: clang
        CXX: clang++
    config-opts:
      - -DTESTS=on
      - -DCMAKE_BUILD_TYPE=Release
      - -DGNUSTEP_INSTALL_TYPE=NONE
      - -DEMBEDDED_BLOCKS_RUNTIME=ON
      - -DOLDABI_COMPAT=OFF
    sources:
      - type: git
        url: https://github.com/gnustep/libobjc2.git
        commit: b67709ad7851973fde127022d8ac6a710c82b1d5
  - name: gnustep-make
    build-options:
      env:
        CC: clang
        CXX: clang++
    config-opts:
      - --with-library-combo=ng-gnu-gnu
      - --with-runtime-abi=gnustep-2.2
    sources:
      - type: git
        url: https://github.com/gnustep/tools-make.git
        commit: 50cf9619e672fb2ff6825f239b5a172c5dc55630
  - name: gnustep-base
    build-options:
      env:
        CC: clang
        CXX: clang++
    sources:
      - type: git
        url: https://github.com/gnustep/libs-base.git
        commit: 530ac3454f9c8af315d823736252cb45221943c1
  - name: mozilla-js-static
    buildsystem: simple
    build-commands:
      - mkdir -p /app/lib /app/include
      - cp -r include/* /app/include/
      - cp -r lib/* /app/lib/
    sources:
      - type: archive
        url: https://github.com/mcarans/spidermonkey-linux/releases/download/0.0.1/mozilla-js-static-lib.tar.gz
        sha256: ac8c18b4655e4798d348eb300201e46aa1574dfc683041f41e2b87f50ae72346
  - name: oolite
    buildsystem: simple
    build-commands:
      - source installers/flatpak/flatpak_build.sh
    sources:
      # Update tag and commit for FlatHub release. For CI and local builds, create_flatpak.sh replaces git source with:
      # - type: dir
      #   path: ../
      - type: git
        url: https://github.com/OoliteProject/oolite.git
        tag: "1.92.1.0"
        commit: dd117d31c2f0e756d478e64584120d3d5cbf64d8
